<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FizzBuzz!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Henny+Penny&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Unkempt:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="hero-container">
      <h1 class="page-title">FizzBuzz!</h1>
      <h2 class="sub-title"">Fizz it, Buzz it, or FizzBuzz it!</>
        <h3 class="instruction-text">Get in a circle and verbally count starting at 1. For multiples of 3 say "Fizz", for multiples of 5 say "Buzz", and for multiples of 3 AND 5, say "FizzBuzz!". Press FizzBuzz! and see how well you do!</h3>
      
      </div>

      <div class="output-container">
        <div class="btn-container">
          <button id="fizz-buzz-btn">FizzBuzz!</button>
          <button id="reset-btn">Reset!</button>
        </div>

        <ul class="output-items" id="output-items"></ul>
      </div>
    </div>
</body>
    <script src="./scripts/script.js" defer></script>
  </body>
</html>
